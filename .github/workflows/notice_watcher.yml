name: Notice Watcher
on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  run-notice:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 schedule selenium webdriver-manager pymsteams
      - name: Run Notice Watcher
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          echo "Job start time: $(date)"
          python watch_notice.py
      - name: Commit and Push sent_titles.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add sent_titles.json
          if ! git diff --cached --quiet; then
            git commit -m "Update sent_titles.json"
            git push
          else
            echo "No changes to commit"
          fi
